<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="mbCh" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="mbIn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <linearGradient id="mbOut" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="mbAg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <marker id="mbAr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/></marker>
  </defs>

  <rect width="900" height="460" fill="#fafafa"/>
  <text x="450" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#1f2937">MessageBus：双队列解耦通道与 Agent</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#6b7280">两边只认 InboundMessage / OutboundMessage，互不依赖实现细节</text>

  <!-- 左：Channels -->
  <text x="100" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Channels（通道层）</text>
  <g font-size="11" fill="#fff">
    <rect x="40" y="105" width="120" height="30" rx="6" fill="url(#mbCh)"/><text x="100" y="124" text-anchor="middle">Telegram</text>
    <rect x="40" y="140" width="120" height="30" rx="6" fill="url(#mbCh)"/><text x="100" y="159" text-anchor="middle">Discord / Slack</text>
    <rect x="40" y="175" width="120" height="30" rx="6" fill="url(#mbCh)"/><text x="100" y="194" text-anchor="middle">飞书 / 企微 / 钉钉</text>
    <rect x="40" y="210" width="120" height="30" rx="6" fill="url(#mbCh)"/><text x="100" y="229" text-anchor="middle">CLI / WebUI</text>
  </g>

  <!-- 中：MessageBus 双队列 -->
  <text x="450" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">MessageBus（asyncio.Queue）</text>

  <rect x="310" y="105" width="150" height="135" rx="10" fill="url(#mbIn)"/>
  <text x="385" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">inbound 队列</text>
  <text x="385" y="146" text-anchor="middle" font-size="10" fill="#d1fae5">入站：Channel → Agent</text>
  <text x="385" y="172" text-anchor="middle" font-size="10" fill="#d1fae5" font-family="monospace">publish_inbound()</text>
  <text x="385" y="190" text-anchor="middle" font-size="10" fill="#d1fae5" font-family="monospace">consume_inbound()</text>
  <text x="385" y="216" text-anchor="middle" font-size="9" fill="#d1fae5">InboundMessage</text>

  <rect x="490" y="105" width="150" height="135" rx="10" fill="url(#mbOut)"/>
  <text x="565" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">outbound 队列</text>
  <text x="565" y="146" text-anchor="middle" font-size="10" fill="#fef3c7">出站：Agent → Channel</text>
  <text x="565" y="172" text-anchor="middle" font-size="10" fill="#fef3c7" font-family="monospace">publish_outbound()</text>
  <text x="565" y="190" text-anchor="middle" font-size="10" fill="#fef3c7" font-family="monospace">dispatch_outbound()</text>
  <text x="565" y="216" text-anchor="middle" font-size="9" fill="#fef3c7">OutboundMessage</text>

  <!-- 右：Agent -->
  <text x="800" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Agent 核心</text>
  <rect x="720" y="125" width="160" height="95" rx="10" fill="url(#mbAg)"/>
  <text x="800" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">AgentLoop</text>
  <text x="800" y="172" text-anchor="middle" font-size="11" fill="#ede9fe">面向通道的轮次</text>
  <text x="800" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">AgentRunner</text>
  <text x="800" y="214" text-anchor="middle" font-size="10" fill="#ede9fe">ReAct 调 LLM / 工具</text>

  <!-- 入站箭头：Channel → inbound → Agent -->
  <line x1="160" y1="150" x2="306" y2="150" stroke="#047857" stroke-width="2" marker-end="url(#mbAr)"/>
  <text x="233" y="142" text-anchor="middle" font-size="10" fill="#047857">用户消息</text>
  <line x1="460" y1="172" x2="716" y2="172" stroke="#047857" stroke-width="2" marker-end="url(#mbAr)"/>

  <!-- 出站箭头：Agent → outbound → Channel -->
  <line x1="720" y1="200" x2="644" y2="200" stroke="#d97706" stroke-width="2" marker-end="url(#mbAr)"/>
  <line x1="490" y1="220" x2="166" y2="220" stroke="#d97706" stroke-width="2" marker-end="url(#mbAr)"/>
  <text x="330" y="212" text-anchor="middle" font-size="10" fill="#d97706">回复（按 channel 订阅分发）</text>

  <!-- 底部说明 -->
  <text x="450" y="290" text-anchor="middle" font-size="12" fill="#374151" font-weight="600">为什么这样设计能轻松接入十几个聊天平台？</text>
  <text x="450" y="312" text-anchor="middle" font-size="11" fill="#6b7280">通道只负责：把外部平台协议翻译成 InboundMessage，把 OutboundMessage 翻译回平台 API</text>
  <text x="450" y="332" text-anchor="middle" font-size="11" fill="#6b7280">Agent 只负责：从 inbound 取消息、处理、往 outbound 推回复，完全不关心渠道细节</text>

  <rect x="120" y="362" width="660" height="58" rx="10" fill="#fff" stroke="#cbd5e1"/>
  <text x="450" y="385" text-anchor="middle" font-size="12" fill="#1f2937"><tspan font-weight="700" fill="#5b21b6">dispatch_outbound</tspan> 是一个后台 Task：不断从 outbound 队列取消息，按 channel 找订阅者回调</text>
  <text x="450" y="405" text-anchor="middle" font-size="11" fill="#6b7280" font-family="monospace">while self._running: msg = await outbound.get(); for cb in subscribers[msg.channel]: await cb(msg)</text>

  <text x="450" y="442" text-anchor="middle" font-size="11" fill="#9ca3af">两个队列 + 两个标准消息结构 = 通道与 Agent 彻底解耦</text>
</svg>
