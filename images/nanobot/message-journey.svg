t: 1.5; max-width: 200px; text-align: center;" class="labelBkg" xmlns="http://www.w3.org/1999/xhtml"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g transform="translate(0, 0)" class="label"><foreignObject height="0" width="0"><div style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" class="labelBkg" xmlns="http://www.w3.org/1999/xhtml"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g transform="translate(0, 0)" class="label"><foreignObject height="0" width="0"><div style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" class="labelBkg" xmlns="http://www.w3.org/1999/xhtml"><span class="edgeLabel"></span></div></foreignObject></g></g><g class="edgeLabel"><g transform="translate(0, 0)" class="label"><foreignObject height="0" width="0"><div style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" class="labelBkg" xmlns="http://www.w3.org/1999/xhtml"><span class="edgeLabel"></span></div></foreignObject></g></g></g><g class="nodes"><g transform="translate(311, 48.599998474121094)" id="flowchart-A-0" class="node default"><rect height="81.20000076293945" width="294.5" y="-40.60000038146973" x="-147.25" style="" class="basic label-container"></rect><g transform="translate(-117.25, -25.600000381469727)" style="" class="label"><rect></rect><foreignObject height="51.20000076293945" width="234.5"><div style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>用户消息到达 <br />(Telegram/WhatApp/Feishu/CLI)</p></span></div></foreignObject></g></g><g transform="translate(311, 263.7999954223633)" id="flowchart-B-1" class="node default"><rect height="249.1999969482422" width="260" y="-124.5999984741211" x="-130" style="" class="basic label-container"></rect><g transform="translate(-100, -109.5999984741211)" style="" class="label"><rect></rect><foreignObject height="219.1999969482422" width="200"><div style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>InboundMessager创建<br /><br /></p><div style="text-align:left"><p></p>- channel: "telegram"<br />- sender_id: "user_id"<br />- chat_id: "123456789"<br />- content: "Hello"<br />- session_key = "telegram:123456789" (自动计算)</div></span></div></foreignObject></g></g><g transform="translate(311, 610.1999969482422)" id="flowchart-C-3" class="node default"><rect height="343.6000061035156" width="606" y="-171.8000030517578" x="-303" style="" class="basic label-container"></rect><g transform="translate(-273, -156.8000030517578)" style="" class="label"><rect></rect><foreignObject height="313.6000061035156" width="546"><div style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>AgentLoop处理消息<br /></p><div style="text-align:left">
1. session = self.sessions.get_or_create(msg.session_key)<br />→ 检查缓存 → 内存中返回<br />→ 未命中 → 尝试加载磁盘<br />→ 未找到 → 创建新 Session<br />
2. messages = session.get_history(max=50)<br />→ 获取最近50条消息<br />→ 转换为 LLM 格式<br />
3.context.build_messages(history=messages,current_message=msg.content)<br />→ 构建完整上下文（系统提示词+历史+新消息）&gt;</div></span></div></foreignObject></g></g><g transform="translate(311, 885.4000015258789)" id="flowchart-D-5" class="node default"><rect height="106.80000305175781" width="217.21250915527344" y="-53.400001525878906" x="-108.60625457763672" style="" class="basic label-container"></rect><g transform="translate(-78.60625457763672, -38.400001525878906)" style="" class="label"><rect></rect><foreignObject height="76.80000305175781" width="157.21250915527344"><div style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>LLM处理<br /> - 输入：content+tools<br />- 输出：LLMResponse</p></span></div></foreignObject></g></g><g transform="translate(311, 1052.6000022888184)" id="flowchart-E-7" class="node default"><rect height="127.5999984741211" width="225.875" y="-63.79999923706055" x="-112.9375" style="" class="basic label-container"></rect><g transform="translate(-82.9375, -48.79999923706055)" style="" class="label"><rect></rect><foreignObject height="97.5999984741211" width="165.875"><div style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>工具执行（如果有）<br /></p><div style="text-align:left">-执行工具函数<br />-将结果添加到消息历史<br />-循环直到无工具调用</div></span></div></foreignObject></g></g><g transform="translate(311, 1278.2000045776367)" id="flowchart-F-9" class="node default"><rect height="223.60000610351562" width="299.875" y="-111.80000305175781" x="-149.9375" style="" class="basic label-container"></rect><g transform="translate(-119.9375, -96.80000305175781)" style="" class="label"><rect></rect><foreignObject height="193.60000610351562" width="239.875"><div style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>保存到会话<br /></p><div style="text-align:left">session.add_message(" user ", msg.content)<br />session.add_message("assistant", final_content)<br />self.sessions.save(session)<br />→ 更新内存中的 messages 列表<br />→ 重写 JSONL 文件到磁盘</div></span></div></foreignObject></g></g><g transform="translate(311, 1519.0000076293945)" id="flowchart-G-11" class="node default"><rect height="158" width="225.8125" y="-79" x="-112.90625" style="" class="basic label-container"></rect><g transform="translate(-82.90625, -64)" style="" class="label"><rect></rect><foreignObject height="128" width="165.8125"><div style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>发送响应<br />OutboundMessage(<br />channel=msg.channel,<br />chat_id=msg.chat_id,<br />content=final_content)</p></span></div></foreignObject></g></g></g></g></g></svg>