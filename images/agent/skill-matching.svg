<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="pain" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fb7185"/><stop offset="100%" stop-color="#be123c"/></linearGradient>
    <linearGradient id="solA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="solB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/></marker>
  </defs>

  <rect width="900" height="470" fill="#fafafa"/>
  <text x="450" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#1f2937">Skill 精准命中：痛点与两套机制</text>

  <!-- 三大痛点 -->
  <text x="40" y="76" font-size="13" font-weight="700" fill="#9f1239">⚠ 清华研究：海量技能下的三大痛点</text>
  <g>
    <rect x="40" y="88" width="270" height="78" rx="10" fill="url(#pain)"/>
    <text x="60" y="114" font-size="14" font-weight="700" fill="#fff">① 上下文过载</text>
    <text x="60" y="136" font-size="11" fill="#fecdd3">技能描述塞满窗口</text>
    <text x="60" y="152" font-size="11" fill="#fecdd3">没有空间处理任务本身</text>

    <rect x="320" y="88" width="270" height="78" rx="10" fill="url(#pain)"/>
    <text x="340" y="114" font-size="14" font-weight="700" fill="#fff">② 选择准确率骤降</text>
    <text x="340" y="136" font-size="11" fill="#fecdd3">候选越多越不会选</text>
    <text x="340" y="152" font-size="11" fill="#fecdd3">错误率指数级上升</text>

    <rect x="600" y="88" width="270" height="78" rx="10" fill="url(#pain)"/>
    <text x="620" y="114" font-size="14" font-weight="700" fill="#fff">③ 技能加载幻觉</text>
    <text x="620" y="136" font-size="11" fill="#fecdd3">不管需不需要都瞎调用</text>
    <text x="620" y="152" font-size="11" fill="#fecdd3">没有匹配也硬用</text>
  </g>

  <!-- 箭头向下 -->
  <text x="450" y="190" text-anchor="middle" font-size="11" fill="#6b7280">↓ 两套互补的命中机制 ↓</text>

  <!-- 解法A 两阶段加载 -->
  <rect x="40" y="210" width="410" height="180" rx="12" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="40" y="210" width="410" height="42" rx="12" fill="url(#solA)"/>
  <rect x="40" y="236" width="410" height="16" fill="url(#solA)"/>
  <text x="245" y="238" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">机制一：Skills 两阶段加载</text>
  <text x="60" y="278" font-size="12" fill="#1e3a8a" font-weight="600">阶段 1 · 启动时</text>
  <text x="60" y="296" font-size="11" fill="#374151">只加载元数据（name + description）</text>
  <text x="320" y="296" font-size="11" fill="#1d4ed8" font-weight="600">≈ 30-100 tokens/skill</text>
  <text x="60" y="322" font-size="12" fill="#1e3a8a" font-weight="600">阶段 2 · 匹配后</text>
  <text x="60" y="340" font-size="11" fill="#374151">才注入相关 Skill 的完整内容</text>
  <text x="60" y="362" font-size="11" fill="#6b7280">判断由大模型完成，客户端不做语义匹配</text>
  <text x="60" y="380" font-size="11" fill="#6b7280">适合：技能数量适中的标准 Skills 场景</text>

  <!-- 解法B Skill-RAG -->
  <rect x="470" y="210" width="400" height="180" rx="12" fill="#fff" stroke="#047857" stroke-width="2"/>
  <rect x="470" y="210" width="400" height="42" rx="12" fill="url(#solB)"/>
  <rect x="470" y="236" width="400" height="16" fill="url(#solB)"/>
  <text x="670" y="238" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">机制二：Skill-RAG 技能检索</text>
  <text x="490" y="278" font-size="12" fill="#064e3b" font-weight="600">像搜索引擎一样</text>
  <text x="490" y="298" font-size="11" fill="#374151">从海量技能库只检索最相关 2-3 个</text>
  <text x="490" y="322" font-size="12" fill="#064e3b" font-weight="600">再交给 Agent 使用</text>
  <text x="490" y="342" font-size="11" fill="#374151">LLM 重排序效果最佳（BM25 / BGE / LLM-rerank）</text>
  <text x="490" y="362" font-size="11" fill="#6b7280">适合：成百上千、上百万级技能场景</text>
  <text x="490" y="380" font-size="11" fill="#6b7280">SRA-Bench：5400 实例 / 636 黄金技能 / 2.6万干扰</text>

  <!-- 结论 banner -->
  <rect x="40" y="408" width="830" height="44" rx="10" fill="#1f2937"/>
  <text x="455" y="429" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">核心结论：瓶颈不在检索，在"需求感知"</text>
  <text x="455" y="446" text-anchor="middle" font-size="11" fill="#d1d5db">先让 AI 准确判断"什么时候该用工具"，再谈工具的丰富度</text>
</svg>
