<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="app" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="tls" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="tcp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="ip" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="link" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9ca3af"/><stop offset="100%" stop-color="#4b5563"/></linearGradient>
  </defs>

  <rect width="880" height="440" fill="#fafafa"/>
  <text x="440" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#1f2937">网络分层模型：HTTPS 与 SSH 在 TCP 端口处分叉</text>

  <!-- 层标签 -->
  <text x="60" y="92" font-size="12" font-weight="700" fill="#6b7280">应用层</text>
  <text x="60" y="162" font-size="12" font-weight="700" fill="#6b7280">加密层</text>
  <text x="60" y="232" font-size="12" font-weight="700" fill="#6b7280">传输层</text>
  <text x="60" y="302" font-size="12" font-weight="700" fill="#6b7280">网络层</text>
  <text x="60" y="372" font-size="12" font-weight="700" fill="#6b7280">链路层</text>

  <!-- HTTPS 列 -->
  <text x="290" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">HTTPS（github.com:443）</text>
  <rect x="170" y="74" width="240" height="40" rx="8" fill="url(#app)"/>
  <text x="290" y="99" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">HTTP（请求/响应）</text>
  <rect x="170" y="144" width="240" height="40" rx="8" fill="url(#tls)"/>
  <text x="290" y="169" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">TLS（加密 + 证书）</text>
  <rect x="170" y="214" width="240" height="40" rx="8" fill="url(#tcp)"/>
  <text x="290" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">TCP 443  ← 受限卡在这里</text>
  <rect x="170" y="284" width="240" height="40" rx="8" fill="url(#ip)"/>
  <text x="290" y="309" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">IP 路由 / 网关</text>
  <rect x="170" y="354" width="240" height="40" rx="8" fill="url(#link)"/>
  <text x="290" y="379" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">网卡 / 网线</text>

  <!-- SSH 列 -->
  <text x="650" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">SSH（github.com:22）</text>
  <rect x="530" y="74" width="240" height="40" rx="8" fill="url(#app)"/>
  <text x="650" y="99" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">SSH / Git 协议</text>
  <rect x="530" y="144" width="240" height="40" rx="8" fill="#e5e7eb" stroke="#cbd5e1"/>
  <text x="650" y="169" text-anchor="middle" font-size="12" fill="#6b7280">（SSH 自带加密，无 TLS）</text>
  <rect x="530" y="214" width="240" height="40" rx="8" fill="url(#tcp)"/>
  <text x="650" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">TCP 22  ← 通</text>
  <rect x="530" y="284" width="240" height="40" rx="8" fill="url(#ip)"/>
  <text x="650" y="309" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">IP 路由 / 网关</text>
  <rect x="530" y="354" width="240" height="40" rx="8" fill="url(#link)"/>
  <text x="650" y="379" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">网卡 / 网线</text>

  <!-- 分叉标记 -->
  <text x="440" y="239" text-anchor="middle" font-size="22" fill="#dc2626" font-weight="700">⇄</text>
  <text x="440" y="200" text-anchor="middle" font-size="11" fill="#dc2626">端口</text>
  <text x="440" y="213" text-anchor="middle" font-size="11" fill="#dc2626">分叉</text>

  <text x="440" y="420" text-anchor="middle" font-size="12" fill="#374151">两条路径共享 IP/链路，但从 TCP 端口开始走不同的路，策略也分别施加</text>
</svg>
