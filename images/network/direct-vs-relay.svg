<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="mA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="mB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <linearGradient id="mT" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <marker id="ar5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/></marker>
    <marker id="arRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker>
  </defs>

  <rect width="880" height="400" fill="#fafafa"/>
  <text x="440" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#1f2937">直连失败 vs 跳板中转成功</text>

  <!-- 直连 -->
  <text x="40" y="80" font-size="13" font-weight="700" fill="#dc2626">✗ 直连：A -> 目标（不通）</text>
  <rect x="40" y="100" width="90" height="56" rx="10" fill="url(#mA)"/>
  <text x="85" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">A</text>
  <text x="85" y="144" text-anchor="middle" font-size="10" fill="#dbeafe">本机</text>
  <rect x="300" y="100" width="120" height="56" rx="10" fill="#fff" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="360" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">校园网出口</text>
  <text x="360" y="144" text-anchor="middle" font-size="10" fill="#dc2626">策略阻断</text>
  <rect x="590" y="100" width="100" height="56" rx="10" fill="url(#mT)"/>
  <text x="640" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">目标:443</text>
  <text x="640" y="144" text-anchor="middle" font-size="10" fill="#fef3c7">github.com</text>
  <line x1="130" y1="128" x2="296" y2="128" stroke="#dc2626" stroke-width="2" marker-end="url(#arRed)"/>
  <line x1="420" y1="128" x2="442" y2="128" stroke="#dc2626" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="465" y="132" font-size="20" fill="#dc2626" font-weight="700">✗</text>
  <line x1="490" y1="128" x2="586" y2="128" stroke="#9ca3af" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="440" y="186" text-anchor="middle" font-size="11" fill="#dc2626">A -> 目标:443 这条路径不可用（TCP 443 超时）</text>

  <!-- 中转 -->
  <text x="40" y="232" font-size="13" font-weight="700" fill="#047857">✓ 中转：A -> B -> 目标（通）</text>
  <rect x="40" y="252" width="90" height="56" rx="10" fill="url(#mA)"/>
  <text x="85" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">A</text>
  <text x="85" y="296" text-anchor="middle" font-size="10" fill="#dbeafe">本机</text>
  <rect x="300" y="252" width="120" height="56" rx="10" fill="url(#mB)"/>
  <text x="360" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">B</text>
  <text x="360" y="296" text-anchor="middle" font-size="10" fill="#d1fae5">跳板机</text>
  <rect x="590" y="252" width="100" height="56" rx="10" fill="url(#mT)"/>
  <text x="640" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">目标:22/443</text>
  <text x="640" y="296" text-anchor="middle" font-size="10" fill="#fef3c7">可达目标</text>
  <line x1="130" y1="280" x2="296" y2="280" stroke="#047857" stroke-width="2" marker-end="url(#ar5)"/>
  <text x="213" y="272" text-anchor="middle" font-size="10" fill="#047857">第 1 段：通</text>
  <line x1="420" y1="280" x2="586" y2="280" stroke="#047857" stroke-width="2" marker-end="url(#ar5)"/>
  <text x="503" y="272" text-anchor="middle" font-size="10" fill="#047857">第 2 段：通</text>
  <text x="440" y="338" text-anchor="middle" font-size="11" fill="#374151">只要 A->B 通 且 B->目标 通，即使 A->目标 不通也能间接访问</text>

  <text x="440" y="378" text-anchor="middle" font-size="11" fill="#9ca3af">注意：B 不是万能出口。B->github.com:22 通，但 B->github.com:443 不通，需按目标/端口分别处理</text>
</svg>
