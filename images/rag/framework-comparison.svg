<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="lcBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="liBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <rect width="880" height="460" fill="#fafafa"/>

  <text x="440" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">两大框架的设计取向</text>
  <text x="440" y="58" text-anchor="middle" font-size="13" fill="#6b7280">同样的 RAG 任务，两种抽象风格</text>

  <!-- 左：LangChain -->
  <rect x="40" y="90" width="380" height="320" rx="14" fill="#fff" stroke="#2563eb" stroke-width="2"/>
  <rect x="40" y="90" width="380" height="48" rx="14" fill="url(#lcBox)"/>
  <rect x="40" y="122" width="380" height="16" fill="url(#lcBox)"/>
  <text x="230" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">LangChain</text>
  <text x="230" y="164" text-anchor="middle" font-size="13" fill="#1e3a8a" font-weight="600">通用编排 · Agent 框架</text>

  <text x="60" y="196" font-size="12" fill="#374151" font-weight="600">心智模型：积木式组合（LCEL）</text>
  <g font-size="11" fill="#4b5563" font-family="monospace">
    <rect x="60" y="208" width="80" height="24" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="100" y="224" text-anchor="middle">retriever</text>
    <text x="148" y="224" fill="#2563eb" font-weight="700">|</text>
    <rect x="158" y="208" width="60" height="24" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="188" y="224" text-anchor="middle">prompt</text>
    <text x="226" y="224" fill="#2563eb" font-weight="700">|</text>
    <rect x="236" y="208" width="50" height="24" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="261" y="224" text-anchor="middle">llm</text>
    <text x="294" y="224" fill="#2563eb" font-weight="700">|</text>
    <rect x="304" y="208" width="60" height="24" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="334" y="224" text-anchor="middle">parser</text>
  </g>

  <text x="60" y="262" font-size="12" fill="#374151" font-weight="600">强项</text>
  <text x="60" y="280" font-size="11" fill="#4b5563">·  组件可组合、可控性强</text>
  <text x="60" y="298" font-size="11" fill="#4b5563">·  高级 retriever 算子丰富</text>
  <text x="60" y="316" font-size="11" fill="#4b5563">·  LangGraph 编排复杂 agent</text>

  <text x="60" y="346" font-size="12" fill="#374151" font-weight="600">代价</text>
  <text x="60" y="364" font-size="11" fill="#4b5563">·  抽象偏厚、样板代码多</text>
  <text x="60" y="382" font-size="11" fill="#4b5563">·  版本变动频繁</text>
  <text x="60" y="400" font-size="11" fill="#4b5563">·  学习曲线较陡</text>

  <!-- 右：LlamaIndex -->
  <rect x="460" y="90" width="380" height="320" rx="14" fill="#fff" stroke="#047857" stroke-width="2"/>
  <rect x="460" y="90" width="380" height="48" rx="14" fill="url(#liBox)"/>
  <rect x="460" y="122" width="380" height="16" fill="url(#liBox)"/>
  <text x="650" y="120" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">LlamaIndex</text>
  <text x="650" y="164" text-anchor="middle" font-size="13" fill="#065f46" font-weight="600">数据框架 · RAG 主场</text>

  <text x="480" y="196" font-size="12" fill="#374151" font-weight="600">心智模型：端到端流水线</text>
  <g font-size="11" fill="#4b5563" font-family="monospace">
    <rect x="480" y="208" width="100" height="24" rx="4" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="530" y="224" text-anchor="middle">VectorStoreIndex</text>
    <text x="588" y="224" fill="#047857">→</text>
    <rect x="602" y="208" width="100" height="24" rx="4" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="652" y="224" text-anchor="middle">as_query_engine</text>
    <text x="710" y="224" fill="#047857">→</text>
    <rect x="724" y="208" width="96" height="24" rx="4" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="772" y="224" text-anchor="middle">.query(...)</text>
  </g>

  <text x="480" y="262" font-size="12" fill="#374151" font-weight="600">强项</text>
  <text x="480" y="280" font-size="11" fill="#4b5563">·  开箱即用、默认值合理</text>
  <text x="480" y="298" font-size="11" fill="#4b5563">·  索引类型多样（树/图/关键词）</text>
  <text x="480" y="316" font-size="11" fill="#4b5563">·  LlamaParse 处理复杂文档</text>

  <text x="480" y="346" font-size="12" fill="#374151" font-weight="600">代价</text>
  <text x="480" y="364" font-size="11" fill="#4b5563">·  高层抽象偶尔难定制</text>
  <text x="480" y="382" font-size="11" fill="#4b5563">·  Agent 生态相对轻量</text>
  <text x="480" y="400" font-size="11" fill="#4b5563">·  文档偶有滞后</text>

  <text x="440" y="438" text-anchor="middle" font-size="12" fill="#6b7280">想要"控"选 LangChain；想要"快"选 LlamaIndex — 二者常组合使用</text>
</svg>
